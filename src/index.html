<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Zapret_ VPN</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap&subset=cyrillic,latin"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#ba9eff",
                        "primary-dim": "#8455ef",
                        "on-primary": "#39008c",
                        "secondary": "#53ddfc",
                        "tertiary": "#ec63ff",
                        "background": "#070d1f",
                        "surface": "#070d1f",
                        "on-background": "#dfe4fe",
                        "on-surface": "#dfe4fe",
                        "on-surface-variant": "#a5aac2",
                        "outline-variant": "#41475b",
                        "surface-container-high": "#171f36",
                        "surface-container-highest": "#1c253e",
                        "error-dim": "#d73357"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .glass-panel {
            background: rgba(186, 158, 255, 0.05);
            backdrop-filter: blur(40px);
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1c253e; border-radius: 10px; }

        /* Titlebar */
        #titlebar {
            height: 30px;
            user-select: none;
            -webkit-user-select: none;
        }
        #titlebar [data-tauri-drag-region] { cursor: move; cursor: grab; }
        #titlebar [data-tauri-drag-region]:active { cursor: grabbing; }

        .restart-banner {
            position: fixed;
            bottom: 1.5rem;
            left: 6.5rem;
            right: 1.5rem;
            background: rgba(18, 22, 38, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(186, 158, 255, 0.25);
            border-radius: 1.5rem;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 9999;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }

        .titlebar-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 30px;
            transition: background 0.15s;
            cursor: pointer;
        }
        .titlebar-btn:hover { background: rgba(186, 158, 255, 0.12); }
        .titlebar-btn.close:hover { background: rgba(215, 51, 87, 0.7); }
        .titlebar-btn .material-symbols-outlined { font-size: 15px; }

        /* Active filter card */
        .card-active {
            border-color: rgba(186, 158, 255, 0.6) !important;
            box-shadow: 0 0 16px rgba(186, 158, 255, 0.2);
        }

        /* Disabled filter card */
        .card-disabled { cursor: not-allowed !important; }

        .toggle-btn { transition: background 0.2s; }
        .toggle-btn.is-on { background: rgba(186, 158, 255, 0.2); }
        .toggle-btn.is-off { background: rgba(65, 71, 91, 0.3); }
        .toggle-thumb { transition: transform 0.2s; }
        .toggle-btn.is-on .toggle-thumb { transform: translateX(24px); }
        .toggle-btn.is-off .toggle-thumb { transform: translateX(0px); }
    </style>
</head>

<body class="bg-background text-on-background font-body selection:bg-primary/30 antialiased overflow-hidden">

    <!-- Custom title bar -->
    <div id="titlebar" class="fixed top-0 left-0 right-0 flex items-stretch z-[9999] border-b border-outline-variant/10"
        style="background:#0a1020;">
        <div data-tauri-drag-region class="flex-1 flex items-center px-4 gap-2">
            <span class="material-symbols-outlined text-primary" style="font-size:16px;">blur_on</span>
            <span class="font-headline text-xs font-bold uppercase tracking-widest text-primary/60">ZAPRET_</span>
        </div>
        <button id="tb-minimize" class="titlebar-btn" data-i18n="minimize" data-i18n-attr="title" title="Minimize">
            <span class="material-symbols-outlined text-on-surface-variant">remove</span>
        </button>
        <button id="tb-maximize" class="titlebar-btn" data-i18n="maximize" data-i18n-attr="title" title="Maximize">
            <span id="tb-maximize-icon" class="material-symbols-outlined text-on-surface-variant">crop_square</span>
        </button>
        <button id="tb-close" class="titlebar-btn close" data-i18n="close" data-i18n-attr="title" title="Close">
            <span class="material-symbols-outlined text-on-surface-variant">close</span>
        </button>
    </div>

    <!-- Close menu (right-click on close button) -->
    <div id="tb-close-menu" class="hidden fixed z-[10000] rounded-xl border border-primary/20 overflow-hidden shadow-2xl py-1"
        style="background:#0d1225; min-width: 200px;">
        <button id="tb-close-menu-tray" class="w-full text-left px-4 py-2 text-xs font-headline text-on-surface hover:bg-primary/10 flex items-center gap-2">
            <span class="material-symbols-outlined text-sm text-primary/60">keyboard_arrow_down</span>
            <span data-i18n="close_menu_tray">Minimize to tray</span>
        </button>
        <button id="tb-close-menu-exit" class="w-full text-left px-4 py-2 text-xs font-headline text-on-surface hover:bg-primary/10 flex items-center gap-2">
            <span class="material-symbols-outlined text-sm text-error-dim">close</span>
            <span data-i18n="close_menu_exit">Exit application</span>
        </button>
    </div>

    <aside
        class="fixed top-[30px] bottom-0 left-0 w-20 bg-[#0c1326] flex flex-col py-10 items-center gap-8 z-50 border-r border-outline-variant/10">
        <div class="text-[#ba9eff] font-black text-xl mb-4">
            <span class="material-symbols-outlined" style="font-variation-settings: 'opsz' 40;">blur_on</span>
        </div>
        <nav class="flex flex-col gap-6 w-full items-center">
            <a href="#"
                class="w-full flex justify-center py-3 border-r-2 border-[#ba9eff] bg-gradient-to-r from-[#ba9eff]/10 to-transparent text-[#ba9eff]"
                data-i18n="nav_home" data-i18n-attr="title" title="Home">
                <span class="material-symbols-outlined">home</span>
            </a>
            <a href="#" id="nav-sites"
                class="w-full flex justify-center py-3 text-[#dfe4fe]/40 hover:text-[#ba9eff] hover:bg-[#171f36] transition-colors duration-200"
                data-i18n="nav_sites" data-i18n-attr="title" title="Site Lists">
                <span class="material-symbols-outlined">language</span>
            </a>
            <a href="#" id="nav-ips"
                class="w-full flex justify-center py-3 text-[#dfe4fe]/40 hover:text-[#ba9eff] hover:bg-[#171f36] transition-colors duration-200"
                data-i18n="nav_ips" data-i18n-attr="title" title="IP Settings">
                <span class="material-symbols-outlined">settings_input_component</span>
            </a>
            <a href="#" id="nav-diagnostics"
                class="w-full flex justify-center py-3 text-[#dfe4fe]/40 hover:text-[#ba9eff] hover:bg-[#171f36] transition-colors duration-200"
                data-i18n="nav_diagnostics" data-i18n-attr="title" title="Diagnostics">
                <span class="material-symbols-outlined">stethoscope</span>
            </a>
        </nav>
    </aside>

    <header
        class="fixed top-[30px] right-0 left-20 flex justify-between items-center px-10 h-20 z-40 bg-transparent backdrop-blur-3xl">
        <div class="flex flex-col">
            <span class="text-[#ba9eff] font-headline text-lg font-bold uppercase tracking-widest">ZAPRET_</span>
            <span id="header-status"
                class="text-[10px] text-error-dim font-bold uppercase tracking-[0.2em] opacity-80"><span data-i18n="status_label">Status</span>:
                <span data-i18n="status_disconnected">Disconnected</span></span>
        </div>
        <div class="flex items-center gap-6">
            <div class="flex flex-col items-end">
                <span class="text-[9px] text-primary/40 uppercase tracking-widest font-bold" data-i18n="ui_version">UI VERSION</span>
                <span id="ui-version-display" class="text-[11px] text-primary font-bold"></span>
            </div>
            <div class="flex flex-col items-end">
                <span class="text-[9px] text-secondary/40 uppercase tracking-widest font-bold" data-i18n="core_version">ZAPRET CORE</span>
                <span id="version-display" class="text-[11px] text-secondary font-bold">vNONE</span>
            </div>
            <button id="check-updates-btn"
                class="flex items-center gap-2 px-4 py-2 bg-surface-container-high border border-outline-variant/30 rounded-xl text-on-surface-variant hover:text-primary hover:border-primary/50 transition-colors text-xs font-bold uppercase tracking-wider">
                <span class="material-symbols-outlined text-sm">update</span>
                <span data-i18n="check_updates">Check Updates</span>
            </button>
            <button id="lang-switcher" class="flex items-center gap-2 px-3 py-2 bg-surface-container-high/50 border border-outline-variant/20 rounded-xl text-primary/70 hover:text-primary transition-all text-[11px] font-bold uppercase tracking-wider">
                <span class="material-symbols-outlined text-sm">translate</span>
                <span id="lang-text">RU</span>
            </button>
            <div class="relative">
                <button id="settings-btn" data-i18n="settings" data-i18n-attr="title" title="Settings"
                    class="flex items-center justify-center w-10 h-10 bg-surface-container-high/50 border border-outline-variant/20 rounded-xl text-primary/70 hover:text-primary transition-all">
                    <span class="material-symbols-outlined text-base">settings</span>
                </button>
                <div id="settings-popover" class="hidden absolute right-0 top-12 z-[1000] rounded-2xl border border-primary/20 overflow-hidden shadow-2xl p-4 w-80" style="background:#0d1225;">
                    <h4 class="font-headline text-[10px] font-bold uppercase tracking-[0.2em] text-primary/70 mb-3" data-i18n="settings">Settings</h4>
                    <label class="flex items-start justify-between gap-3 py-2 cursor-pointer">
                        <div class="flex-1">
                            <div class="text-sm text-on-surface font-headline" data-i18n="autostart_label">Launch on Windows startup</div>
                            <div class="text-[10px] text-on-surface-variant mt-0.5" data-i18n="autostart_hint">Start minimized to tray</div>
                        </div>
                        <button id="autostart-toggle" type="button" class="toggle-btn is-off flex-shrink-0 relative w-12 h-6 rounded-full transition-colors">
                            <span class="toggle-thumb absolute top-0.5 left-0.5 w-5 h-5 bg-primary rounded-full shadow"></span>
                        </button>
                    </label>
                    <div class="border-t border-outline-variant/10 my-3"></div>
                    <div class="text-xs text-on-surface-variant/70 mb-2" data-i18n="close_pref_label">When the close button is clicked:</div>
                    <div class="flex flex-col gap-1">
                        <label class="flex items-center gap-2 text-xs text-on-surface cursor-pointer px-2 py-1.5 rounded hover:bg-primary/10">
                            <input type="radio" name="close-pref" value="ask" class="accent-primary">
                            <span data-i18n="close_pref_ask">Ask every time</span>
                        </label>
                        <label class="flex items-center gap-2 text-xs text-on-surface cursor-pointer px-2 py-1.5 rounded hover:bg-primary/10">
                            <input type="radio" name="close-pref" value="tray" class="accent-primary">
                            <span data-i18n="close_pref_tray">Minimize to tray</span>
                        </label>
                        <label class="flex items-center gap-2 text-xs text-on-surface cursor-pointer px-2 py-1.5 rounded hover:bg-primary/10">
                            <input type="radio" name="close-pref" value="exit" class="accent-primary">
                            <span data-i18n="close_pref_exit">Exit application</span>
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main id="sections-host" class="ml-20 pt-20 h-screen overflow-hidden bg-surface" style="margin-top:30px;">
        <!-- Section fragments are injected here by src/components/index.js -->
    </main>

    <!-- Top-level modals and overlays are injected here by src/components/index.js -->
    <div id="modals-host"></div>

    <div class="fixed top-0 right-0 w-[600px] h-[600px] bg-primary/5 rounded-full blur-[120px] pointer-events-none -z-10 opacity-50"></div>
    <div class="fixed bottom-0 left-20 w-[400px] h-[400px] bg-tertiary/5 rounded-full blur-[100px] pointer-events-none -z-10 opacity-30"></div>

    <script type="module" src="/main.js"></script>
</body>

</html>
