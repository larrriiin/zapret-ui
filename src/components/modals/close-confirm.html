<!-- Close confirmation modal -->
<div id="close-confirm-modal" class="hidden fixed inset-0 z-[10001] flex items-center justify-center" style="background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);">
    <div class="glass-panel rounded-2xl border border-primary/20 p-6 max-w-sm w-full mx-4" style="background: #0d1225;">
        <h3 class="font-headline text-lg font-bold text-on-surface mb-2" data-i18n="close_confirm_title">Closing Zapret</h3>
        <p class="text-sm text-on-surface-variant mb-6" data-i18n="close_confirm_body">What would you like to do?</p>
        <div class="flex flex-col gap-2 mb-4">
            <button id="close-confirm-tray"
                class="w-full py-3 bg-primary rounded-xl text-on-primary font-bold text-xs uppercase tracking-widest hover:bg-primary-dim transition-colors flex items-center justify-center gap-2">
                <span class="material-symbols-outlined text-sm">keyboard_arrow_down</span>
                <span data-i18n="close_confirm_tray">Minimize to tray</span>
            </button>
            <button id="close-confirm-exit"
                class="w-full py-3 bg-surface-container-high border border-outline-variant/30 rounded-xl text-on-surface font-bold text-xs uppercase tracking-widest hover:border-error/50 hover:text-error-dim transition-colors flex items-center justify-center gap-2">
                <span class="material-symbols-outlined text-sm">close</span>
                <span data-i18n="close_confirm_exit">Exit application</span>
            </button>
        </div>
        <label class="flex items-center gap-2 text-xs text-on-surface-variant cursor-pointer mb-4">
            <input type="checkbox" id="close-confirm-remember" class="accent-primary">
            <span data-i18n="close_confirm_remember">Remember my choice</span>
        </label>
        <button id="close-confirm-cancel" class="w-full py-2 text-xs text-on-surface-variant hover:text-primary transition-colors" data-i18n="cancel">Cancel</button>
    </div>
</div>
