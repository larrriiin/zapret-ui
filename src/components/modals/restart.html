<!-- Restart Prompt Modal -->
<div id="restart-modal"
    class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center">
    <div class="glass-panel rounded-2xl border border-primary/30 p-8 max-w-md mx-4">
        <div class="flex items-center gap-3 mb-4">
            <span class="material-symbols-outlined text-primary text-2xl">restart_alt</span>
            <h3 class="font-headline text-lg font-bold text-primary" data-i18n="restart_required">Restart Required</h3>
        </div>
        <p class="text-on-surface-variant text-sm mb-6" data-i18n="restart_desc">Changes have been saved. Restart Zapret to apply the new
            settings?</p>
        <div class="flex gap-3">
            <button id="restart-later"
                class="flex-1 py-3 rounded-xl border border-outline-variant/30 text-on-surface-variant font-bold text-xs uppercase tracking-wider hover:bg-surface-container-high transition-colors" data-i18n="later">
                Later
            </button>
            <button id="restart-now"
                class="flex-1 py-3 bg-primary rounded-xl text-on-primary font-bold text-xs uppercase tracking-wider hover:bg-primary-dim transition-colors" data-i18n="restart_now">
                Restart Now
            </button>
        </div>
    </div>
</div>
