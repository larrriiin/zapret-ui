<!-- Info Help Modal -->
<div id="info-modal"
    class="hidden fixed inset-0 bg-black/80 backdrop-blur-md z-[100] flex items-center justify-center">
    <div class="bg-[#0d1225] rounded-2xl border border-primary/30 p-8 max-w-md w-full mx-4 shadow-2xl">
        <div class="flex items-center gap-3 mb-6">
            <span class="material-symbols-outlined text-primary text-2xl">help_outline</span>
            <h3 id="info-title" class="font-headline text-lg font-bold text-on-surface uppercase tracking-widest" data-i18n="information">Information</h3>
        </div>
        <div id="info-content" class="space-y-4 text-sm text-on-surface-variant leading-relaxed">
            <!-- Content injected by JS -->
        </div>
        <div class="mt-8">
            <button id="info-modal-close"
                class="w-full py-3 bg-primary/20 border border-primary/30 rounded-xl text-primary font-bold text-xs uppercase tracking-wider hover:bg-primary/30 transition-colors" data-i18n="close">
                Close
            </button>
        </div>
    </div>
</div>
