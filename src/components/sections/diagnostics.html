<!-- Diagnostics Section -->
<div id="section-diagnostics"
    class="hidden fixed top-[30px] right-0 bottom-0 left-0 ml-20 pt-20 overflow-y-auto bg-surface z-10">
    <div class="p-8 space-y-8 max-w-[1400px] mx-auto">
    <!-- Diagnostics Block -->
    <div class="glass-panel rounded-2xl border border-primary/10 p-6 w-full">
        <div class="flex items-center justify-between mb-6">
            <div>
                <h3 class="font-headline text-sm font-bold uppercase tracking-widest text-primary" data-i18n="diagnostics">Diagnostics</h3>
                <p class="text-xs text-on-surface-variant mt-1" data-i18n="diagnostics_desc">Check system configuration and potential issues</p>
            </div>
            <div class="flex items-center gap-2">
                <button id="diagnostics-copy-btn" class="hidden px-4 py-2 border border-outline-variant/30 rounded-xl text-[10px] font-bold uppercase tracking-widest text-on-surface-variant hover:text-secondary hover:border-secondary/50 transition-colors flex items-center gap-1.5">
                    <span class="material-symbols-outlined text-sm">content_copy</span>
                    <span id="diagnostics-copy-label" data-i18n="copy_report">Copy Report</span>
                </button>
                <button id="diagnostics-show-all-btn" class="hidden px-4 py-2 border border-outline-variant/30 rounded-xl text-[10px] font-bold uppercase tracking-widest text-on-surface-variant hover:text-secondary hover:border-secondary/50 transition-colors" data-i18n="show_all_checks">
                    Show All Checks
                </button>
            </div>
        </div>

        <!-- Diagnostics Results -->
        <div id="diagnostics-results" class="hidden space-y-3 w-full mb-6">
            <!-- Results will be populated here -->
        </div>

        <!-- Main Action Button -->
        <button id="run-diagnostics-btn"
            class="w-full py-4 bg-primary rounded-xl text-on-primary font-bold text-xs uppercase tracking-wider hover:bg-primary-dim transition-all duration-300 flex items-center justify-center gap-2 mb-6">
            <span class="material-symbols-outlined text-sm">play_arrow</span>
            <span data-i18n="run_diagnostics">Run Diagnostics</span>
        </button>

        <!-- Discord Cache Clear -->
        <div id="discord-cache-section" class="hidden pt-6 border-t border-outline-variant/10">
            <div class="flex items-center justify-between">
                <div>
                    <h3 class="font-headline text-sm font-bold uppercase tracking-widest text-secondary" data-i18n="discord_cache">Discord Cache</h3>
                    <p class="text-xs text-on-surface-variant mt-1" data-i18n="discord_cache_desc">Clear Discord cache to fix potential connection issues</p>
                </div>
                <button id="clear-discord-cache-btn"
                    class="px-6 py-3 bg-secondary rounded-xl text-on-primary font-bold text-xs uppercase tracking-wider hover:opacity-80 transition-colors" data-i18n="clear_cache">
                    Clear Cache
                </button>
            </div>
            <div id="discord-cache-status" class="hidden mt-4 text-sm"></div>
        </div>
    </div>

    <!-- Tests Section -->
    <div class="glass-panel rounded-2xl border border-primary/10 p-6 w-full">
        <h3 class="font-headline text-sm font-bold uppercase tracking-widest text-secondary mb-4" data-i18n="tests">Tests</h3>

        <!-- Test Type Selection -->
        <div class="mb-4">
            <p class="text-xs text-on-surface-variant mb-2 uppercase tracking-wider" data-i18n="test_type">Test Type</p>
            <div class="flex gap-2">
                <button id="test-type-standard" data-type="standard"
                    class="flex-1 py-2 rounded-xl border border-primary/30 text-xs font-bold uppercase tracking-wider transition-colors card-active" data-i18n="test_standard">
                    Standard (HTTP/Ping)
                </button>
                <button id="test-type-dpi" data-type="dpi"
                    class="flex-1 py-2 rounded-xl border border-outline-variant/30 text-xs font-bold uppercase tracking-wider text-on-surface-variant hover:border-primary/30 transition-colors" data-i18n="test_dpi">
                    DPI Checkers (TCP 16-20)
                </button>
            </div>
        </div>

        <!-- Run Button & Cancel -->
        <div class="flex gap-2 mb-4">
            <button id="run-tests-btn"
                class="flex-1 py-3 bg-secondary rounded-xl text-on-primary font-bold text-xs uppercase tracking-wider hover:opacity-80 transition-colors flex items-center justify-center gap-2">
                <span class="material-symbols-outlined text-sm">science</span>
                <span data-i18n="run_tests">Run Tests</span>
            </button>
            <button id="cancel-tests-btn"
                class="hidden px-4 py-3 bg-surface-container-high border border-outline-variant/30 rounded-xl text-on-surface-variant font-bold text-xs uppercase tracking-wider hover:bg-surface-container-high transition-colors" data-i18n="cancel">
                Cancel
            </button>
        </div>

        <!-- Status -->
        <div id="tests-status" class="hidden text-sm mb-3"></div>

        <!-- Live Log -->
        <div id="tests-log"
            class="hidden bg-[#0a1022] rounded-xl p-3 max-h-[320px] overflow-y-auto font-mono text-xs space-y-0.5">
        </div>

        <!-- Summary Results -->
        <div id="tests-results" class="hidden mt-4 space-y-2 w-full"></div>
    </div>
    </div>
</div>
