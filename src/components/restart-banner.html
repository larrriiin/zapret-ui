<!-- Global Restart Banner -->
<div id="restart-banner" class="restart-banner opacity-0 translate-y-full" style="display: none;">
    <div class="flex items-center gap-4">
        <div class="w-12 h-12 rounded-2xl bg-primary/20 flex items-center justify-center border border-primary/20">
            <span class="material-symbols-outlined text-primary text-2xl animate-pulse">restart_alt</span>
        </div>
        <div>
            <p class="text-sm font-bold text-on-surface" data-i18n="restart_banner_title">Restart required to apply changes</p>
            <p class="text-[11px] text-on-surface-variant" data-i18n="restart_banner_desc">The new rules and filters will take effect after restarting Zapret</p>
        </div>
    </div>
    <button id="restart-banner-btn" class="px-8 py-3 bg-primary rounded-xl text-on-primary font-bold text-xs uppercase tracking-wider hover:bg-primary-dim transition-all shadow-lg hover:shadow-primary/30 active:scale-95" data-i18n="restart_now">
        Restart Now
    </button>
</div>
