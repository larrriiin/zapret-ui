name: "Cache Builder"
on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-cache:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
          
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri'
          shared-key: 'zapret-ui-rust-cache'
          
      - name: install frontend dependencies
        run: npm install
        
      # We simply build the app to generate and save the cache for future tags.
      # No signing or release steps are needed here.
      - name: Build to populate cache
        run: |
          npx tauri build --no-bundle
